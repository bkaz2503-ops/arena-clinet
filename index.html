<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena CliNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <div id="pantalla-pin" class="flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow text-center w-full max-w-md mx-4">
      <h1 class="text-3xl font-bold mb-4">Arena CliNet</h1>
      <p class="mb-6">Ingresa el PIN del juego</p>

      <input
        id="pin"
        type="text"
        placeholder="Ej: 123456"
        class="border p-3 w-full mb-4 rounded-lg text-center text-xl"
      />

      <button onclick="unirse()" class="bg-blue-600 text-white px-6 py-3 rounded-xl w-full">
        Unirse
      </button>
    </div>
  </div>

  <div id="pantalla-juego" class="hidden min-h-screen p-6">
    <div class="max-w-3xl mx-auto">
      <div class="flex justify-between items-center mb-6">
        <div>
          <p class="text-sm text-gray-500">PIN del juego</p>
          <h2 id="pin-mostrado" class="text-2xl font-bold">000000</h2>
        </div>
        <div class="text-right">
          <p class="text-sm text-gray-500">Tiempo restante</p>
          <h2 class="text-2xl font-bold text-red-500">20s</h2>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow p-6 mb-6">
        <p class="text-sm text-gray-500 mb-2">Pregunta 1 de 10</p>
        <h3 class="text-2xl font-bold mb-4">Paciente de 65 años con dolor torácico opresivo de 30 minutos. ¿Cuál es la conducta inicial más adecuada?</h3>
      </div>

      <div class="grid md:grid-cols-2 gap-4">
        <button onclick="responder('A')" class="bg-red-500 text-white p-5 rounded-2xl text-left font-semibold shadow hover:opacity-90">
          A. Indicar reposo domiciliario y reevaluar en 24 horas
        </button>

        <button onclick="responder('B')" class="bg-blue-500 text-white p-5 rounded-2xl text-left font-semibold shadow hover:opacity-90">
          B. Solicitar ECG y evaluación urgente por probable síndrome coronario agudo
        </button>

        <button onclick="responder('C')" class="bg-yellow-400 text-gray-900 p-5 rounded-2xl text-left font-semibold shadow hover:opacity-90">
          C. Prescribir omeprazol por probable reflujo gastroesofágico
        </button>

        <button onclick="responder('D')" class="bg-green-500 text-white p-5 rounded-2xl text-left font-semibold shadow hover:opacity-90">
          D. Indicar antibiótico empírico y alta inmediata
        </button>
      </div>

      <div id="mensaje" class="hidden mt-6 bg-white rounded-2xl shadow p-4 text-center font-semibold"></div>

      <div class="mt-6 text-center">
        <button onclick="volverInicio()" class="text-sm text-gray-600 underline">Salir del juego</button>
      </div>
    </div>
  </div>

  <script>
    function unirse() {
      const pin = document.getElementById('pin').value.trim();

      if (!pin) {
        alert('Ingresa un PIN');
        return;
      }

      document.getElementById('pin-mostrado').textContent = pin;
      document.getElementById('pantalla-pin').classList.add('hidden');
      document.getElementById('pantalla-juego').classList.remove('hidden');
      document.getElementById('mensaje').classList.add('hidden');
      document.getElementById('mensaje').textContent = '';
    }

    function responder(opcion) {
      const mensaje = document.getElementById('mensaje');
      mensaje.classList.remove('hidden');

      if (opcion === 'B') {
        mensaje.textContent = 'Respuesta enviada: opción B. Buena elección.';
      } else {
        mensaje.textContent = 'Respuesta enviada: opción ' + opcion + '.';
      }
    }

    function volverInicio() {
      document.getElementById('pantalla-juego').classList.add('hidden');
      document.getElementById('pantalla-pin').classList.remove('hidden');
      document.getElementById('pin').value = '';
    }
  </script>

</body>
</html>
