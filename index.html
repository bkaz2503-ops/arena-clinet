<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena CliNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <div class="flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-2xl shadow text-center">
      
      <h1 class="text-3xl font-bold mb-4">Arena CliNet</h1>
      <p class="mb-6">Ingresa el PIN del juego</p>

      <input 
        type="text" 
        placeholder="Ej: 123456" 
        class="border p-3 w-full mb-4 rounded-lg text-center text-xl"
      />

      <button class="bg-blue-600 text-white px-6 py-3 rounded-xl w-full">
        Unirse
      </button>

    </div>
  </div>

</body>
</html>
